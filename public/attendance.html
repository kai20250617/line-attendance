<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>員工打卡</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:linear-gradient(180deg,#f3f6fb,#eef1f5);
  color:#111827;
}

.page{
  min-height:100vh;
  padding:24px 18px 40px;
}

.header{
  text-align:center;
  margin-top:20px;
  margin-bottom:24px;
}

.brand{
  font-size:14px;
  letter-spacing:2px;
  color:#8a6a2f;
  font-weight:700;
}

h1{
  margin:10px 0 6px;
  font-size:38px;
  letter-spacing:1px;
}

.subtitle{
  color:#6b7280;
  font-size:15px;
}

.card{
  background:#fff;
  max-width:520px;
  margin:0 auto;
  border-radius:26px;
  padding:26px;
  box-shadow:0 16px 40px rgba(15,23,42,.12);
}

.profile{
  display:flex;
  align-items:center;
  gap:16px;
  padding-bottom:20px;
  border-bottom:1px solid #e5e7eb;
}

.avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg,#1f2937,#0f172a);
  color:#f5c76b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:800;
}

.name{
  font-size:26px;
  font-weight:800;
}

.role{
  margin-top:4px;
  color:#6b7280;
  font-size:15px;
}

.statusBox{
  margin-top:20px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:18px;
  text-align:left;
  line-height:1.8;
  font-size:16px;
}

.statusTitle{
  font-weight:800;
  margin-bottom:6px;
  color:#111827;
}

.success{
  color:#15803d;
  font-weight:800;
}

.error{
  color:#dc2626;
  font-weight:800;
}

.info{
  color:#2563eb;
  font-weight:800;
}

.actions{
  margin-top:24px;
  display:grid;
  gap:14px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  color:white;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

button:active{
  transform:scale(.98);
}

.clockin{
  background:linear-gradient(135deg,#16a34a,#166534);
}

.clockout{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
}

.refresh{
  background:linear-gradient(135deg,#2563eb,#1e40af);
}

.back{
  background:linear-gradient(135deg,#374151,#111827);
}

.footerNote{
  margin-top:18px;
  color:#6b7280;
  font-size:14px;
  line-height:1.7;
}

.gps{
  display:inline-block;
  margin-top:6px;
  padding:6px 10px;
  background:#eef2ff;
  color:#1d4ed8;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.loading{
  color:#6b7280;
}

@media(max-width:480px){
  h1{font-size:34px;}
  .card{padding:22px;}
  button{font-size:20px;}
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="brand">AURUM HOUSE</div>
    <h1>員工打卡</h1>
    <div class="subtitle">Attendance Clock System</div>
  </div>

  <div class="card">

    <div class="profile">
      <div class="avatar">AH</div>

      <div>
        <div id="employeeName" class="name">
          LINE登入中...
        </div>

        <div id="employeeRole" class="role">
          請稍候...
        </div>
      </div>
    </div>

    <div id="status" class="statusBox">
      <div class="statusTitle">目前狀態</div>
      <div class="loading">正在確認員工資料...</div>
    </div>

    <div class="actions">
      <button class="clockin" onclick="clock('上班')">
        上班打卡
      </button>

      <button class="clockout" onclick="clock('下班')">
        下班打卡
      </button>

      <button class="refresh" onclick="location.reload()">
        重新整理
      </button>

      <button class="back" onclick="history.back()">  返回上一頁
        
      </button>
    </div>

    <div class="footerNote">
      打卡時系統會取得 GPS 定位，用於出勤紀錄與位置確認。
      <br>
      <span class="gps">GPS 定位啟用</span>
    </div>

  </div>

</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

let profile = null;
let employee = null;

function setStatus(html){
  document.getElementById("status").innerHTML = html;
}

function formatDateTime(value){
  const d = new Date(value || new Date());

  return d.toLocaleString("zh-TW", {
    timeZone:"Asia/Taipei",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

async function init(){
  const nameBox = document.getElementById("employeeName");
  const roleBox = document.getElementById("employeeRole");

  try{
    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    profile = await liff.getProfile();

    const res = await fetch(
      "/api/check-employee/" + profile.userId
    );

    const data = await res.json();

    if(!data.success || !data.isEmployee){
      nameBox.innerHTML =
      "<span class='error'>未綁定員工</span>";

      roleBox.innerHTML =
      "請聯絡管理員完成 LINE 綁定";

      setStatus(`
        <div class="statusTitle">無法打卡</div>
        <div class="error">您尚未完成員工綁定。</div>
      `);

      return;
    }

    employee = data.employee;

    nameBox.innerHTML =
    employee.name || "-";

    roleBox.innerHTML =
    `${employee.department || "-"} / ${employee.position || "-"}`;

    setStatus(`
      <div class="statusTitle">目前狀態</div>
      <div class="success">已完成員工驗證，可以打卡。</div>
      <div>登入時間：${formatDateTime()}</div>
    `);

  }catch(error){
    console.error(error);

    nameBox.innerHTML =
    "<span class='error'>登入失敗</span>";

    roleBox.innerHTML =
    "請使用 LINE 開啟此頁面";

    setStatus(`
      <div class="statusTitle">系統訊息</div>
      <div class="error">登入失敗，請重新開啟頁面。</div>
    `);
  }
}

function getLocation(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){
      reject("此裝置不支援定位");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position=>{
        resolve({
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        });
      },
      error=>{
        reject("無法取得定位，請開啟 GPS 權限");
      },
      {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
      }
    );
  });
}

async function clock(type){
  if(!profile || !employee){
    alert("尚未完成 LINE 登入或員工驗證");
    return;
  }

  try{
    setStatus(`
      <div class="statusTitle">打卡處理中</div>
      <div class="info">正在取得 GPS 定位...</div>
    `);

    const location =
    await getLocation();

    setStatus(`
      <div class="statusTitle">打卡處理中</div>
      <div class="info">正在送出打卡資料...</div>
    `);

    const res =
    await fetch(
      "/api/clock",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          lineUserId: profile.userId,
          name: employee.name,
          type: type,
          latitude: location.latitude,
          longitude: location.longitude
        })
      }
    );

    const data =
    await res.json();

    if(!res.ok || data.success === false){
      setStatus(`
        <div class="statusTitle">打卡失敗</div>
        <div class="error">${data.message || "打卡失敗"}</div>
      `);
      return;
    }

    setStatus(`
      <div class="statusTitle">打卡完成</div>
      <div class="success">✅ ${type}打卡成功</div>
      <div>時間：${formatDateTime(data.time)}</div>
      <div>位置：${data.address || "已記錄 GPS 位置"}</div>
    `);

  }catch(error){
    console.error(error);

    setStatus(`
      <div class="statusTitle">系統訊息</div>
      <div class="error">${error}</div>
    `);
  }
}

init();
</script>

</body>
</html>
