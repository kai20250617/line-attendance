<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>員工打卡</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  text-align:center;
}

.card{
  background:white;
  padding:25px;
  border-radius:12px;
  max-width:500px;
  margin:20px auto;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
  margin-bottom:10px;
}

.name{
  font-size:22px;
  font-weight:bold;
  color:#333;
}

.status{
  margin-top:15px;
  color:#555;
  line-height:1.8;
}

button{
  width:90%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  color:white;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.clockin{
  background:#2e7d32;
}

.clockout{
  background:#e53935;
}

.refresh{
  background:#1976d2;
}

.error{
  color:red;
  font-weight:bold;
}

.success{
  color:green;
  font-weight:bold;
}

.small{
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<h1>🕒 員工打卡</h1>

<div class="card">

  <div id="employeeName" class="name">
    LINE登入中...
  </div>

  <div id="status" class="status">
    請稍候...
  </div>

  <button class="clockin" onclick="clock('上班')">
    🟢 上班打卡
  </button>

  <button class="clockout" onclick="clock('下班')">
    🔴 下班打卡
  </button>

  <button class="refresh" onclick="location.reload()">
    🔄 重新整理
  </button>

  <p class="small">
    打卡時會取得 GPS 位置
  </p>

</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

let profile = null;
let employee = null;

async function init(){
  const nameBox = document.getElementById("employeeName");
  const statusBox = document.getElementById("status");

  try{
    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    profile = await liff.getProfile();

    const res = await fetch(
      "/api/check-employee/" + profile.userId
    );

    const data = await res.json();

    if(!data.success || !data.isEmployee){
      nameBox.innerHTML =
      "<span class='error'>您不是員工</span>";

      statusBox.innerHTML =
      "請先完成員工 LINE 綁定，或聯絡管理員。";

      return;
    }

    employee = data.employee;

    nameBox.innerHTML =
    employee.name;

    statusBox.innerHTML =
    `
    部門：${employee.department || "-"}<br>
    職稱：${employee.position || "-"}<br>
    狀態：可以打卡
    `;

  }catch(error){
    console.error(error);

    nameBox.innerHTML =
    "<span class='error'>登入失敗</span>";

    statusBox.innerHTML =
    "請使用 LINE 開啟此頁面。";
  }
}

function getLocation(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){
      reject("此裝置不支援定位");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position=>{
        resolve({
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        });
      },
      error=>{
        reject("無法取得定位，請開啟 GPS 權限");
      },
      {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
      }
    );
  });
}

async function clock(type){
  const statusBox = document.getElementById("status");

  if(!profile || !employee){
    alert("尚未完成 LINE 登入或員工驗證");
    return;
  }

  try{
    statusBox.innerHTML =
    "正在取得定位...";

    const location =
    await getLocation();

    statusBox.innerHTML =
    "正在送出打卡資料...";

    const res =
    await fetch(
      "/api/clock",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          lineUserId: profile.userId,
          name: employee.name,
          type: type,
          latitude: location.latitude,
          longitude: location.longitude
        })
      }
    );

    const data =
    await res.json();

    if(!res.ok || data.success === false){
      statusBox.innerHTML =
      "<span class='error'>" +
      (data.message || "打卡失敗") +
      "</span>";
      return;
    }

    const now =
    new Date().toLocaleString("zh-TW", {
      timeZone:"Asia/Taipei"
    });

    statusBox.innerHTML =
    `
    <span class="success">✅ ${type}打卡成功</span><br>
    時間：${now}<br>
    緯度：${location.latitude}<br>
    經度：${location.longitude}
    `;

  }catch(error){
    console.error(error);

    statusBox.innerHTML =
    "<span class='error'>" + error + "</span>";
  }
}

init();
</script>

</body>
</html>
