<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>出勤紀錄</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    a {
      color: blue;
    }
  </style>
</head>
<body>

  <h1>出勤紀錄</h1>

  <table>
    <thead>
      <tr>
        <th>姓名</th>
        <th>類型</th>
        <th>日期</th>
        <th>時間</th>
        <th>位置</th>
      </tr>
    </thead>
    <tbody id="records">
      <tr>
        <td colspan="5">資料載入中...</td>
      </tr>
    </tbody>
  </table>

  <script>
    function formatTaiwanTime(utcTime) {
      const date = new Date(utcTime);

      const dateText = date.toLocaleDateString("zh-TW", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });

      const timeText = date.toLocaleTimeString("zh-TW", {
        timeZone: "Asia/Taipei",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      return {
        date: dateText,
        time: timeText
      };
    }

    async function loadRecords() {
      const res = await fetch("/api/attendance");
      const data = await res.json();

      const tbody = document.getElementById("records");
      tbody.innerHTML = "";

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">目前沒有出勤紀錄</td></tr>';
        return;
      }

      data.forEach(item => {
        const tw = formatTaiwanTime(item.clock_time);

        const mapUrl =
          `https://www.google.com/maps?q=${item.latitude},${item.longitude}`;

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${item.name}</td>
          <td>${item.type}</td>
          <td>${tw.date}</td>
          <td>${tw.time}</td>
          <td>
            <a href="${mapUrl}" target="_blank">
              查看位置
            </a>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    loadRecords();
  </script>

</body>
</html>
