<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工時統計</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
h1{text-align:center;}
.top{text-align:center;margin-bottom:20px;}
button{background:#4a90e2;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;margin:5px;}
.logout{background:#e53935;}
.back{background:#2196F3;}
table{width:100%;border-collapse:collapse;background:white;margin-top:20px;}
th{background:#222;color:white;padding:12px;}
td{border:1px solid #ddd;padding:10px;text-align:center;}
</style>
</head>

<body>

<h1>⏰ 員工工時統計</h1>

<div class="top">
  <button onclick="loadData()">重新整理</button>
  <button class="back" onclick="location.href='/dashboard.html'">返回後台</button>
</div>

<table>
<thead>
<tr>
  <th>姓名</th>
  <th>日期</th>
  <th>上班時間</th>
  <th>下班時間</th>
  <th>工時(小時)</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td colspan="5">讀取中...</td>
</tr>
</tbody>
</table>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "/login.html";
}

async function loadData(){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "<tr><td colspan='5'>載入中...</td></tr>";

  try{
    const response = await fetch("/api/attendance");
    const data = await response.json();

    if(!data || data.length === 0){
      tbody.innerHTML = "<tr><td colspan='5'>目前沒有出勤資料</td></tr>";
      return;
    }

    const groups = {};

    data.forEach(item=>{
      const date = new Date(item.clock_time).toLocaleDateString("zh-TW");
      const key = item.name + "_" + date;

      if(!groups[key]){
        groups[key] = {
          name:item.name,
          date:date,
          start:null,
          end:null
        };
      }

      if(item.type === "上班"){
        if(!groups[key].start || new Date(item.clock_time) < new Date(groups[key].start)){
          groups[key].start = item.clock_time;
        }
      }

      if(item.type === "下班"){
        if(!groups[key].end || new Date(item.clock_time) > new Date(groups[key].end)){
          groups[key].end = item.clock_time;
        }
      }
    });

    const rows = Object.values(groups);

    if(rows.length === 0){
      tbody.innerHTML = "<tr><td colspan='5'>目前沒有可統計的工時資料</td></tr>";
      return;
    }

    tbody.innerHTML = "";

    rows.forEach(row=>{
      let hours = "-";

      if(row.start && row.end){
        const diff = (new Date(row.end) - new Date(row.start)) / 1000 / 60 / 60;
        hours = diff.toFixed(2);
      }

      tbody.innerHTML += `
        <tr>
          <td>${row.name}</td>
          <td>${row.date}</td>
          <td>${row.start ? new Date(row.start).toLocaleTimeString("zh-TW") : "-"}</td>
          <td>${row.end ? new Date(row.end).toLocaleTimeString("zh-TW") : "-"}</td>
          <td>${hours}</td>
        </tr>
      `;
    });

  }catch(error){
    console.error(error);
    tbody.innerHTML = "<tr><td colspan='5'>讀取失敗</td></tr>";
  }
}

loadData();
</script>

</body>
</html>
