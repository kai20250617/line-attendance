<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每月工時薪資總表</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
h1{text-align:center;}
.top{text-align:center;margin:20px;}
button{padding:10px 20px;background:#4a90e2;color:white;border:none;border-radius:5px;cursor:pointer;margin:5px;}
.logout{background:#e53935;}
table{width:100%;border-collapse:collapse;background:white;}
th{background:#222;color:white;padding:12px;}
td{border:1px solid #ddd;padding:10px;text-align:center;}
.total{font-weight:bold;color:green;}
</style>
</head>

<body>

<h1>📅 每月工時薪資總表</h1>

<div class="top">
  <button onclick="loadMonthly()">重新整理</button>
  <button class="logout" onclick="logout()">登出</button>
  <button class="back"  onclick="location.href='/dashboard.html'">返回後台</button>
  <button onclick="location.href='/api/export-monthly'">  匯出 CSV</button>
  
</div>

<table>
<thead>
<tr>
  <th>員工</th>
  <th>本月總工時</th>
  <th>時薪</th>
  <th>預估薪資</th>
</tr>
</thead>

<tbody id="monthlyTable">
<tr><td colspan="4">讀取中...</td></tr>
</tbody>
</table>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "/login.html";
}

async function loadMonthly(){
  const tbody = document.getElementById("monthlyTable");
  tbody.innerHTML = "<tr><td colspan='4'>載入中...</td></tr>";

  const attendanceRes = await fetch("/api/attendance");
  const attendance = await attendanceRes.json();

  const employeeRes = await fetch("/api/employees");
  const employees = await employeeRes.json();

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  const dayGroups = {};

  attendance.forEach(item=>{
    const d = new Date(item.clock_time);

    if(d.getFullYear() !== year || d.getMonth() !== month){
      return;
    }

    const date = d.toLocaleDateString("zh-TW");
    const key = item.name + "_" + date;

    if(!dayGroups[key]){
      dayGroups[key] = {
        name:item.name,
        start:null,
        end:null
      };
    }

    if(item.type === "上班"){
      if(!dayGroups[key].start || new Date(item.clock_time) < new Date(dayGroups[key].start)){
        dayGroups[key].start = item.clock_time;
      }
    }

    if(item.type === "下班"){
      if(!dayGroups[key].end || new Date(item.clock_time) > new Date(dayGroups[key].end)){
        dayGroups[key].end = item.clock_time;
      }
    }
  });

  const monthly = {};

  Object.values(dayGroups).forEach(day=>{
    if(!monthly[day.name]){
      monthly[day.name] = 0;
    }

    if(day.start && day.end){
      const hours = (new Date(day.end) - new Date(day.start)) / 1000 / 60 / 60;
      monthly[day.name] += hours;
    }
  });

  tbody.innerHTML = "";

  const names = Object.keys(monthly);

  if(names.length === 0){
    tbody.innerHTML = "<tr><td colspan='4'>目前沒有本月工時資料</td></tr>";
    return;
  }

  names.forEach(name=>{
    const emp = employees.find(e=>e.name === name);
    const wage = emp ? Number(emp.hourly_wage || 200) : 200;
    const hours = monthly[name];
    const salary = hours * wage;

    tbody.innerHTML += `
      <tr>
        <td>${name}</td>
        <td>${hours.toFixed(2)}</td>
        <td>NT$${wage}</td>
        <td class="total">NT$${Math.round(salary).toLocaleString("zh-TW")}</td>
      </tr>
    `;
  });
}
<button onclick="location.href='/api/export-monthly'">
  匯出 CSV
</button>
loadMonthly();
</script>

</body>
</html>
