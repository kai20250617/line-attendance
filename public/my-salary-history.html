<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的薪資歷史</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  text-align:center;
}

h1{
  font-size:38px;
}

.card{
  background:white;
  max-width:600px;
  margin:20px auto;
  padding:25px;
  border-radius:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.filter{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

select,button{
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#1976d2;
  color:white;
  border:none;
  cursor:pointer;
  margin:5px;
}

.pdf{
  background:#0d47a1;
}

.sign{
  background:#2e7d32;
}

.signed{
  background:#777;
}

.clear{
  background:#555;
}

.item{
  border-bottom:1px solid #eee;
  padding:20px 0;
}

.month{
  font-size:28px;
  font-weight:bold;
}

.gross{
  font-size:22px;
}

.net{
  color:#0d47a1;
  font-size:28px;
  font-weight:bold;
}

.status{
  font-size:18px;
  font-weight:bold;
}

.error{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>📄 我的薪資歷史</h1>

<div class="card">

  <div class="filter">
    <select id="yearFilter">
      <option value="">全部年份</option>
    </select>

    <select id="monthFilter">
      <option value="">全部月份</option>
      <option value="1">1 月</option>
      <option value="2">2 月</option>
      <option value="3">3 月</option>
      <option value="4">4 月</option>
      <option value="5">5 月</option>
      <option value="6">6 月</option>
      <option value="7">7 月</option>
      <option value="8">8 月</option>
      <option value="9">9 月</option>
      <option value="10">10 月</option>
      <option value="11">11 月</option>
      <option value="12">12 月</option>
    </select>

    <button onclick="renderList()">篩選</button>
    <button class="clear" onclick="clearFilter()">清除</button>
  </div>

  <div id="list">LINE 登入中...</div>

</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

let salaryHistory = [];
let employeeId = null;

async function init(){
  const list = document.getElementById("list");

  try{
    await liff.init({
      liffId:LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile =
    await liff.getProfile();

    const salaryRes =
    await fetch("/api/my-salary/" + profile.userId);

    const salaryData =
    await salaryRes.json();

    if(salaryData.success){
      employeeId =
      salaryData.employeeId;
    }

    const res =
    await fetch("/api/my-salary-history/" + profile.userId);

    const data =
    await res.json();

    if(!data.success){
      list.innerHTML =
      "<div class='error'>讀取薪資歷史失敗</div>";
      return;
    }

    salaryHistory =
    data.data || data.rows || [];

    buildYearFilter();
    renderList();

  }catch(err){
    console.error(err);

    list.innerHTML =
    "<div class='error'>讀取失敗，請稍後再試</div>";
  }
}

function getYearMonth(item){
  let year = item.year;
  let month = item.month;

  if((!year || !month) && item.salary_month){
    const parts =
    String(item.salary_month).split("-");

    year = parts[0];
    month = parts[1];
  }

  return {
    year: year ? Number(year) : null,
    month: month ? Number(month) : null
  };
}

function buildYearFilter(){
  const yearFilter =
  document.getElementById("yearFilter");

  yearFilter.innerHTML =
  `<option value="">全部年份</option>`;

  let years = [];

  salaryHistory.forEach(item=>{
    const ym = getYearMonth(item);

    if(ym.year){
      years.push(ym.year);
    }
  });

  years =
  [...new Set(years)]
  .sort((a,b)=>b-a);

  years.forEach(year=>{
    yearFilter.innerHTML += `
      <option value="${year}">
        ${year} 年
      </option>
    `;
  });
}

function renderList(){
  const list =
  document.getElementById("list");

  const year =
  document.getElementById("yearFilter").value;

  const month =
  document.getElementById("monthFilter").value;

  let rows =
  salaryHistory.filter(item=>{
    const ym = getYearMonth(item);

    if(
      year &&
      Number(ym.year) !== Number(year)
    ){
      return false;
    }

    if(
      month &&
      Number(ym.month) !== Number(month)
    ){
      return false;
    }

    return true;
  });

  if(rows.length === 0){
    list.innerHTML =
    "<p>目前沒有符合條件的薪資紀錄</p>";
    return;
  }

  let html = "";

  rows.forEach(item=>{
    const gross =
    Number(
      item.gross_salary ||
      item.grossSalary ||
      item.gross ||
      item.total_salary ||
      item.totalSalary ||
      0
    );

    const net =
    Number(
      item.net_salary ||
      item.netSalary ||
      item.net ||
      item.final_salary ||
      item.finalSalary ||
      0
    );

    const ym =
    getYearMonth(item);

    const y =
    ym.year || "-";

    const m =
    ym.month
    ? String(ym.month).padStart(2,"0")
    : "-";

    const signedText =
    item.is_signed
    ? "✅ 已簽收"
    : "❌ 未簽收";

    const signedTime =
    item.signed_at
    ? new Date(item.signed_at).toLocaleString("zh-TW", {
        timeZone:"Asia/Taipei"
      })
    : "";

    html += `
      <div class="item">
        <div class="month">${y}-${m}</div>

        <p class="gross">
          應發薪資：
          NT$${gross.toLocaleString("zh-TW")}
        </p>

        <p class="net">
          實發薪資：
          NT$${net.toLocaleString("zh-TW")}
        </p>

        <p class="status">
          ${signedText}
        </p>

        ${
          signedTime
          ? `<p>簽收時間：${signedTime}</p>`
          : ""
        }

        <button class="pdf" onclick="downloadPdf()">
          下載 PDF
        </button>

        ${
          item.is_signed
          ? `<button class="signed" disabled>已簽收</button>`
          : `<button class="sign" onclick="signSalary(${item.id})">薪資單簽收</button>`
        }
      </div>
    `;
  });

  list.innerHTML = html;
}

function clearFilter(){
  document.getElementById("yearFilter").value = "";
  document.getElementById("monthFilter").value = "";

  renderList();
}

function downloadPdf(){
  if(!employeeId){
    alert("找不到員工 ID，無法下載 PDF");
    return;
  }

  location.href =
  "/api/payslip/" + employeeId;
}

async function signSalary(id){
  if(!id){
    alert("找不到薪資紀錄 ID");
    return;
  }

  if(
    !confirm("確認簽收本月薪資單？")
  ){
    return;
  }

  try{
    const res =
    await fetch(
      "/api/sign-salary/" + id,
      {
        method:"POST"
      }
    );

    const data =
    await res.json();

    alert(
      data.message ||
      "簽收完成"
    );

    location.reload();

  }catch(err){
    console.error(err);
    alert("簽收失敗，請稍後再試");
  }
}

init();
</script>

</body>
</html>
