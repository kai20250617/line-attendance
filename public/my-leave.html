<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我的請假紀錄</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#222;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.approved{
    color:green;
    font-weight:bold;
}

.rejected{
    color:red;
    font-weight:bold;
}

.pending{
    color:orange;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>📋 我的請假紀錄</h1>

<h3 id="employeeName">
LINE登入中...
</h3>

<table>

<thead>
<tr>
<th>假別</th>
<th>開始日期</th>
<th>結束日期</th>
<th>原因</th>
<th>狀態</th>
</tr>
</thead>

<tbody id="leaveTable">
<tr>
<td colspan="5">讀取中...</td>
</tr>
</tbody>

</table>

<script>

const LIFF_ID = "2010241581-YtDxQgWd";

let profile = null;

async function init(){

    await liff.init({
        liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

        liff.login();
        return;

    }

    profile =
    await liff.getProfile();

    document.getElementById(
        "employeeName"
    ).innerHTML =
    "員工：" +
    profile.displayName;

    loadLeaves();

}

async function loadLeaves(){

    const tbody =
    document.getElementById(
        "leaveTable"
    );

    const res =
    await fetch("/api/leaves");

    const data =
    await res.json();

    const myLeaves =
    data.filter(
        item =>
        item.line_user_id ===
        profile.userId
    );

    if(myLeaves.length===0){

        tbody.innerHTML=
        `
        <tr>
        <td colspan="5">
        目前沒有請假紀錄
        </td>
        </tr>
        `;

        return;

    }

    tbody.innerHTML="";

    myLeaves.forEach(item=>{

        let statusClass =
        "pending";

        if(item.status==="已核准"){
            statusClass =
            "approved";
        }

        if(item.status==="已駁回"){
            statusClass =
            "rejected";
        }

        tbody.innerHTML += `
        <tr>

            <td>
            ${item.leave_type}
            </td>

            <td>
            ${item.start_date}
            </td>

            <td>
            ${item.end_date}
            </td>

            <td>
            ${item.reason}
            </td>

            <td class="${statusClass}">
            ${item.status}
            </td>

        </tr>
        `;

    });

}

init();

</script>

</body>
</html>
