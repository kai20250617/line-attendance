<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤規則設定</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
.card{max-width:520px;background:white;margin:auto;padding:25px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
h1{text-align:center;}
label{font-weight:bold;display:block;margin-top:15px;}
input{width:100%;padding:12px;margin-top:6px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
button{width:100%;padding:14px;margin-top:20px;border:none;border-radius:8px;color:white;font-size:18px;cursor:pointer;}
.save{background:#1976d2;}
.back{background:#222;}
.result{text-align:center;margin-top:15px;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h1>⚙️ 出勤規則設定</h1>

<label>上班時間</label>
<input type="time" id="work_start">

<label>下班時間</label>
<input type="time" id="work_end">

<label>休息時數</label>
<input type="number" id="break_hours" step="0.5">

<label>加班開始時間</label>
<input type="time" id="overtime_start">

<label>遲到寬限分鐘</label>
<input type="number" id="late_allowance">

<label>早退寬限分鐘</label>
<input type="number" id="early_allowance">

<button class="save" onclick="saveRules()">儲存規則</button>
<button class="back" onclick="location.href='/dashboard.html'">返回後台</button>

<div id="result" class="result"></div>
</div>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

async function loadRules(){
  try{
    const res = await fetch("/api/rules");
    const data = await res.json();

    document.getElementById("work_start").value = data.work_start || "09:00";
    document.getElementById("work_end").value = data.work_end || "18:00";
    document.getElementById("break_hours").value = data.break_hours || 1;
    document.getElementById("overtime_start").value = data.overtime_start || "18:30";
    document.getElementById("late_allowance").value = data.late_allowance || 0;
    document.getElementById("early_allowance").value = data.early_allowance || 0;

  }catch(err){
    console.error(err);
    document.getElementById("result").innerHTML = "讀取失敗";
  }
}

async function saveRules(){
  const body = {
    work_start: document.getElementById("work_start").value,
    work_end: document.getElementById("work_end").value,
    break_hours: document.getElementById("break_hours").value,
    overtime_start: document.getElementById("overtime_start").value,
    late_allowance: document.getElementById("late_allowance").value,
    early_allowance: document.getElementById("early_allowance").value
  };

  try{
    const res = await fetch("/api/rules", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
    data.success ? "✅ " + data.message : "❌ " + data.message;

  }catch(err){
    console.error(err);
    document.getElementById("result").innerHTML = "儲存失敗";
  }
}

loadRules();
</script>

</body>
</html>
