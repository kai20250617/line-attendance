<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出勤規則設定</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

h1{
  text-align:center;
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  box-sizing:border-box;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
  margin-top:20px;
}

.save{
  background:#4CAF50;
}

.back{
  background:#2196F3;
}

.logout{
  background:#e53935;
}
</style>
</head>

<body>

<div class="container">

<h1>⚙️ 出勤規則設定</h1>

<label>上班時間</label>
<input type="time" id="work_start" value="08:00">

<label>下班時間</label>
<input type="time" id="work_end" value="17:00">

<label>午休扣除時數</label>
<input type="number" id="break_hours" value="1" step="0.5">

<label>加班起算時間</label>
<input type="time" id="overtime_start" value="17:30">

<button class="save" onclick="saveRules()">儲存設定</button>

<button class="back" onclick="location.href='/dashboard.html'">返回後台</button>

</div>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "/login.html";
}

async function loadRules(){
  const res = await fetch("/api/rules");
  const data = await res.json();

  document.getElementById("work_start").value =
    data.work_start || "08:00";

  document.getElementById("work_end").value =
    data.work_end || "17:00";

  document.getElementById("break_hours").value =
    data.break_hours || 1;

  document.getElementById("overtime_start").value =
    data.overtime_start || "17:30";
}

async function saveRules(){
  const res = await fetch("/api/rules",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      work_start:document.getElementById("work_start").value,
      work_end:document.getElementById("work_end").value,
      break_hours:document.getElementById("break_hours").value,
      overtime_start:document.getElementById("overtime_start").value
    })
  });

  const data = await res.json();
  alert(data.message);
}

loadRules();
</script>

</body>
</html>
