<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>客戶專區</title>
<style>

.dark{background:#222;}
.green{background:#2e7d32;}
.blue{background:#1976d2;}
</style>
</head>

<body>

<h1>🛒 客戶專區</h1>

<div class="card">
  <h2>Aurum House</h2>

  <div class="grid">
    <a href="https://www.aurum-house.com/gold-">🥇 黃金商品</a>
    <a class="dark" href="https://www.aurum-house.com/price-chart-">📈 即時金價</a>
    <a class="green" href="https://www.aurum-house.com/contact">📞 聯絡客服</a>
    <a class="blue" href="https://www.aurum-house.com/">🌐 官方網站</a>
  </div>
</div>

</body>
</html>
