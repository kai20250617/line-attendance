<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>員工 LINE 綁定</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  text-align:center;
}

.box{
  background:white;
  max-width:500px;
  margin:auto;
  padding:30px;
  border-radius:10px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  background:#06C755;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:5px;
  cursor:pointer;
  width:100%;
}

#status{
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>🔗 員工 LINE 綁定</h1>

<p id="lineName">
LINE登入中...
</p>

<input
  id="employeeName"
  placeholder="請輸入員工姓名，例如 Kevin"
/>

<button onclick="bindLine()">
綁定我的 LINE
</button>

<p id="status"></p>

</div>

<script>

const LIFF_ID = "2010241581-YtDxQgWd";

let profile = null;

async function init(){

  await liff.init({
    liffId: LIFF_ID
  });

  if(!liff.isLoggedIn()){

    liff.login();
    return;

  }

  profile =
  await liff.getProfile();

  document.getElementById(
    "lineName"
  ).innerText =
  "LINE名稱：" +
  profile.displayName;

}

async function bindLine(){

  const employeeName =
  document.getElementById(
    "employeeName"
  ).value.trim();

  if(!employeeName){

    alert("請輸入員工姓名");
    return;

  }

  const res =
  await fetch(
    "/api/employees/bind",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:employeeName,
        lineUserId:profile.userId
      })
    }
  );

  const data =
  await res.json();

  document.getElementById(
    "status"
  ).innerText =
  data.message;

}

init();

</script>

</body>
</html>
