<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE員工綁定</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}
.card{
  background:white;
  max-width:480px;
  margin:40px auto;
  padding:25px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
h1{text-align:center;}
input{
  width:100%;
  padding:14px;
  margin:15px 0;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
  font-size:18px;
  text-align:center;
}
button{
  width:100%;
  background:#06c755;
  color:white;
  border:none;
  padding:15px;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}
.result{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>🔗 LINE員工綁定</h1>

  <p style="text-align:center;">
    請輸入公司提供的綁定碼
  </p>

  <input id="bindCode" placeholder="例如 EMP123456">

  <button onclick="bindLine()">
    立即綁定
  </button>

  <div id="result" class="result"></div>
</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

async function bindLine(){
  const resultBox =
  document.getElementById("result");

  try{
    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile =
    await liff.getProfile();

    const bindCode =
    document.getElementById("bindCode").value.trim();

    if(!bindCode){
      alert("請輸入綁定碼");
      return;
    }

    const res =
    await fetch("/api/bind-line", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        bindCode,
        lineUserId:profile.userId,
        displayName:profile.displayName
      })
    });

    const data =
    await res.json();

    if(data.success){
      resultBox.innerHTML =
      "✅ " + data.message + "<br>員工：" + data.employeeName;

      setTimeout(()=>{
        location.href = "/employee-menu.html";
      },1500);
    }else{
      resultBox.innerHTML =
      "❌ " + data.message;
    }

  }catch(err){
    console.error(err);

    resultBox.innerHTML =
    "❌ 綁定失敗：" + err.message;
  }
}
</script>

</body>
</html>
