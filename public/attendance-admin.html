<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>出勤管理</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#222;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

button{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>📋 出勤管理</h1>

<table>

<thead>
<tr>
<th>ID</th>
<th>員工</th>
<th>類型</th>
<th>時間</th>
<th>操作</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td colspan="5">
讀取中...
</td>
</tr>
</tbody>

</table>

<script>

async function loadData(){

const res =
await fetch("/api/attendance-admin");

const data =
await res.json();

const tbody =
document.getElementById("tbody");

tbody.innerHTML="";

data.forEach(item=>{

tbody.innerHTML += `
<tr>
<td>${item.id}</td>
<td>${item.name}</td>
<td>${item.type}</td>
<td>${new Date(item.clock_time)
.toLocaleString("zh-TW")}</td>
<td>

<button onclick="del(${item.id})">
刪除
</button>

</td>
</tr>
`;

});

}

async function del(id){

if(!confirm("確定刪除？")){
return;
}

await fetch(
"/api/attendance-admin/"+id,
{
method:"DELETE"
}
);

loadData();

}

loadData();

</script>

</body>
</html>
