<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請假審核管理</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
h1{text-align:center;}
.top{text-align:center;margin:20px;}
table{width:100%;border-collapse:collapse;background:white;}
th{background:#222;color:white;padding:12px;}
td{border:1px solid #ddd;padding:10px;text-align:center;}

button{
  padding:8px 14px;
  margin:3px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

.refresh{background:#4a90e2;}
.export{background:#2e7d32;}
.approve{background:#4CAF50;}
.reject{background:#e53935;}
.delete{background:#b71c1c;}
.back{background:#2196F3;}

.pending{color:#ff9800;font-weight:bold;}
.approved{color:#4CAF50;font-weight:bold;}
.rejected{color:#e53935;font-weight:bold;}
.weekday{color:#1976d2;font-weight:bold;}
.weekend{color:#e53935;font-weight:bold;}
</style>
</head>

<body>

<h1>📝 請假審核管理</h1>

<div class="top">
  <button class="refresh" onclick="loadLeaves()">重新整理</button>
  <button class="export" onclick="exportCSV()">匯出 CSV</button>
  <button class="back" onclick="location.href='/dashboard.html'">返回後台</button>
</div>

<table>
<thead>
<tr>
  <th>員工</th>
  <th>假別</th>
  <th>開始日期</th>
  <th>開始星期</th>
  <th>結束日期</th>
  <th>結束星期</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>

<tbody id="leaveTable">
<tr>
<td colspan="8">載入中...</td>
</tr>
</tbody>
</table>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

let leaveRows = [];

function formatDate(value){
  if(!value){
    return "-";
  }

  const d = new Date(value);

  if(isNaN(d.getTime())){
    return value;
  }

  return d.toLocaleDateString("zh-TW", {
    timeZone:"Asia/Taipei",
    year:"numeric",
    month:"2-digit",
    day:"2-digit"
  });
}

function getWeekday(value){
  if(!value){
    return "-";
  }

  const d = new Date(value);

  if(isNaN(d.getTime())){
    return "-";
  }

  const week = [
    "星期日",
    "星期一",
    "星期二",
    "星期三",
    "星期四",
    "星期五",
    "星期六"
  ];

  return week[d.getDay()];
}

function getWeekdayClass(value){
  const weekday =
  getWeekday(value);

  if(weekday === "星期日" || weekday === "星期六"){
    return "weekend";
  }

  return "weekday";
}

function getStatusClass(status){
  if(status === "已核准" || status === "核准"){
    return "approved";
  }

  if(status === "已駁回" || status === "駁回"){
    return "rejected";
  }

  return "pending";
}

async function loadLeaves(){
  const tbody =
  document.getElementById("leaveTable");

  tbody.innerHTML =
  "<tr><td colspan='8'>載入中...</td></tr>";

  try{
    const res =
    await fetch("/api/leaves");

    const data =
    await res.json();

    if(!Array.isArray(data) || data.length === 0){
      leaveRows = [];

      tbody.innerHTML =
      "<tr><td colspan='8'>目前沒有請假申請</td></tr>";

      return;
    }

    leaveRows =
    data;

    renderTable();

  }catch(error){
    console.error(error);

    tbody.innerHTML =
    "<tr><td colspan='8'>讀取失敗</td></tr>";
  }
}

function renderTable(){
  const tbody =
  document.getElementById("leaveTable");

  tbody.innerHTML = "";

  leaveRows.forEach(item=>{
    const statusClass =
    getStatusClass(item.status);

    tbody.innerHTML += `
      <tr>
        <td>${item.name || "-"}</td>

        <td>${item.leave_type || "-"}</td>

        <td>${formatDate(item.start_date)}</td>

        <td>
          <span class="${getWeekdayClass(item.start_date)}">
            ${getWeekday(item.start_date)}
          </span>
        </td>

        <td>${formatDate(item.end_date)}</td>

        <td>
          <span class="${getWeekdayClass(item.end_date)}">
            ${getWeekday(item.end_date)}
          </span>
        </td>

        <td class="${statusClass}">
          ${item.status || "待審核"}
        </td>

        <td>
          <button
            class="approve"
            onclick="updateStatus(${item.id}, '已核准')">
            核准
          </button>

          <button
            class="reject"
            onclick="updateStatus(${item.id}, '已駁回')">
            駁回
          </button>

          <button
            class="delete"
            onclick="deleteLeave(${item.id})">
            刪除
          </button>
        </td>
      </tr>
    `;
  });
}

async function updateStatus(id,status){
  if(
    !confirm(
      "確定要改為【" +
      status +
      "】嗎？"
    )
  ){
    return;
  }

  try{
    const res =
    await fetch(
      "/api/leave/status",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          id:id,
          status:status
        })
      }
    );

    const data =
    await res.json();

    alert(data.message || "已更新");

    loadLeaves();

  }catch(err){
    console.error(err);
    alert("更新失敗");
  }
}

async function deleteLeave(id){
  if(!confirm("確定刪除這筆請假紀錄？")){
    return;
  }

  try{
    const res =
    await fetch(
      "/api/leaves/" + id,
      {
        method:"DELETE"
      }
    );

    const data =
    await res.json();

    alert(data.message || "已刪除");

    loadLeaves();

  }catch(err){
    console.error(err);
    alert("刪除失敗");
  }
}

function exportCSV(){
  if(!leaveRows || leaveRows.length === 0){
    alert("沒有資料可匯出");
    return;
  }

  let csv =
  "\uFEFF員工,假別,開始日期,開始星期,結束日期,結束星期,狀態\n";

  leaveRows.forEach(item=>{
    csv += [
      item.name || "-",
      item.leave_type || "-",
      formatDate(item.start_date),
      getWeekday(item.start_date),
      formatDate(item.end_date),
      getWeekday(item.end_date),
      item.status || "待審核"
    ].map(v =>
      `"${String(v).replace(/"/g,'""')}"`
    ).join(",") + "\n";
  });

  const blob =
  new Blob([csv], {
    type:"text/csv;charset=utf-8;"
  });

  const url =
  URL.createObjectURL(blob);

  const a =
  document.createElement("a");

  a.href = url;
  a.download =
  "leave-records.csv";

  a.click();

  URL.revokeObjectURL(url);
}

loadLeaves();
</script>

</body>
</html>
