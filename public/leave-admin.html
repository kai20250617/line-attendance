<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請假審核管理</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}
h1{text-align:center;}
table{width:100%;border-collapse:collapse;background:white;}
th{background:#222;color:white;padding:12px;}
td{border:1px solid #ddd;padding:10px;text-align:center;}

button{
  padding:8px 14px;
  margin:3px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

.refresh{background:#4a90e2;}
.approve{background:#4CAF50;}
.reject{background:#e53935;}
.logout{background:#ff5722;}

.pending{
  color:#ff9800;
  font-weight:bold;
}

.approved{
  color:#4CAF50;
  font-weight:bold;
}

.rejected{
  color:#e53935;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>📝 請假審核管理</h1>

<div style="text-align:center;margin:20px;">
  <button class="refresh" onclick="loadLeaves()">重新整理</button>
  <button class="logout" onclick="logout()">登出</button>
  <button class="back"  onclick="location.href='/dashboard.html'">返回後台</button>
  
</div>

<table>
<thead>
<tr>
  <th>員工</th>
  <th>假別</th>
  <th>開始日期</th>
  <th>結束日期</th>
  <th>原因</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>

<tbody id="leaveTable">
<tr>
<td colspan="7">載入中...</td>
</tr>
</tbody>
</table>

<script>

// 登入驗證
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "/login.html";
}

async function loadLeaves(){

  const tbody =
  document.getElementById("leaveTable");

  tbody.innerHTML =
  "<tr><td colspan='7'>載入中...</td></tr>";

  try{

    const res =
    await fetch("/api/leaves");

    const data =
    await res.json();

    if(data.length === 0){

      tbody.innerHTML =
      "<tr><td colspan='7'>目前沒有請假申請</td></tr>";

      return;

    }

    tbody.innerHTML = "";

    data.forEach(item=>{

      let statusClass = "pending";

      if(item.status === "已核准"){
        statusClass = "approved";
      }

      if(item.status === "已駁回"){
        statusClass = "rejected";
      }

      tbody.innerHTML += `
        <tr>

          <td>${item.name}</td>

          <td>${item.leave_type}</td>

          <td>${item.start_date}</td>

          <td>${item.end_date}</td>

          <td>${item.reason}</td>

          <td class="${statusClass}">
            ${item.status}
          </td>

          <td>
            <button
              class="approve"
              onclick="updateStatus(${item.id}, '已核准')">
              核准
            </button>

            <button
              class="reject"
              onclick="updateStatus(${item.id}, '已駁回')">
              駁回
            </button>
          </td>

        </tr>
      `;

    });

  }
  catch(error){

    console.error(error);

    tbody.innerHTML =
    "<tr><td colspan='7'>讀取失敗</td></tr>";

  }

}

async function updateStatus(id,status){

  if(
    !confirm(
      "確定要改為【" +
      status +
      "】嗎？"
    )
  ){
    return;
  }

  const res =
  await fetch(
    "/api/leave/status",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        id:id,
        status:status
      })
    }
  );

  const data =
  await res.json();

  alert(data.message);

  loadLeaves();

}

loadLeaves();

</script>

</body>
</html>
