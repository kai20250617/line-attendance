<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS電子圍籬設定</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  box-sizing:border-box;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
  margin:5px;
}

.save{
  background:#4CAF50;
}

.back{
  background:#2196F3;
}

label{
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>📍 GPS電子圍籬設定</h1>

<label>
GPS電子圍籬啟用
</label>

<select id="gps_enabled" style="width:100%;padding:10px;margin-bottom:15px;">
  <option value="1">啟用</option>
  <option value="0">停用</option>
</select>

<label>
公司緯度
</label>

<input
  id="company_lat"
  value="24.7906"
>

<label>
公司經度
</label>

<input
  id="company_lng"
  value="120.9969"
>

<label>
允許距離(公尺)
</label>

<input
  id="gps_radius"
  value="300"
>

<button
  class="save"
  onclick="saveSettings()"
>
儲存設定
</button>

<button class="back"  onclick="location.href='/dashboard.html'">返回後台</button>

</div>

<script>

if(
  localStorage.getItem("adminLogin")
  !==
  "yes"
){
  window.location.href =
  "/login.html";
}

async function loadSettings(){

  try{

    const res =
    await fetch(
      "/api/settings"
    );

    const data =
    await res.json();

    document.getElementById(
      "gps_enabled"
    ).value =
    data.gps_enabled;

    document.getElementById(
      "company_lat"
    ).value =
    data.company_lat;

    document.getElementById(
      "company_lng"
    ).value =
    data.company_lng;

    document.getElementById(
      "gps_radius"
    ).value =
    data.gps_radius;

  }
  catch(err){

    console.log(err);

  }

}

async function saveSettings(){

  const gps_enabled =
  document.getElementById(
    "gps_enabled"
  ).value;

  const company_lat =
  document.getElementById(
    "company_lat"
  ).value;

  const company_lng =
  document.getElementById(
    "company_lng"
  ).value;

  const gps_radius =
  document.getElementById(
    "gps_radius"
  ).value;

  const res =
  await fetch(
    "/api/settings",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        gps_enabled,
        company_lat,
        company_lng,
        gps_radius
      })
    }
  );

  const data =
  await res.json();

  alert(data.message);

}

loadSettings();

</script>

</body>
</html>
