<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工專區</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;text-align:center;}
h1{margin-bottom:10px;}
.card{background:white;border-radius:12px;padding:20px;max-width:520px;margin:20px auto;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
a{display:block;padding:18px 10px;border-radius:10px;background:#4a90e2;color:white;text-decoration:none;font-size:20px;font-weight:bold;}
.green{background:#2e7d32;}
.orange{background:#f57c00;}
.purple{background:#6a1b9a;}
.teal{background:#00897b;}
.gray{background:#455a64;}
.error{color:red;font-weight:bold;}
</style>
</head>

<body>

<h1>👨‍💼 員工專區</h1>
<div id="box" class="card">LINE登入中...</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

async function init(){
  const box = document.getElementById("box");

  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const res = await fetch("/api/check-employee/" + profile.userId);
    const data = await res.json();

    if(!data.isEmployee){
      location.href = "/customer-menu.html";
      return;
    }

    box.innerHTML = `
      <h2>${data.employee.name}</h2>
      <p>${data.employee.department || "-"} / ${data.employee.position || "-"}</p>

      <div class="grid">
        <a href="/attendance.html">🕒 我要打卡</a>
        <a class="green" href="/leave.html">📝 我要請假</a>
        <a class="purple" href="/my-leave.html">📋 請假紀錄</a>
        <a class="teal" href="/worktime.html">⏰ 我的工時</a>
        <a class="orange" href="/my-salary.html">💰 我的薪資</a>
        <a class="gray" href="/bind.html">🔗 LINE綁定</a>
      </div>
    `;

  }catch(err){
    console.error(err);
    box.innerHTML = "<div class='error'>讀取失敗，請稍後再試</div>";
  }
}

init();
</script>

</body>
</html>
