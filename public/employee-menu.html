<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工專區</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  text-align:center;
}
.card{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:520px;
  margin:20px auto;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:15px 0;
}
.stat{
  background:#f1f5f9;
  border-radius:10px;
  padding:12px;
}
.stat strong{
  display:block;
  font-size:20px;
  color:#0d47a1;
  margin-top:5px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}
a{
  display:block;
  padding:16px 10px;
  border-radius:10px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}
.green{background:#2e7d32;}
.orange{background:#f57c00;}
.purple{background:#6a1b9a;}
.teal{background:#00897b;}
.gray{background:#455a64;}
.red{background:#c62828;}
.error{color:red;font-weight:bold;}
.debug{
  margin-top:10px;
  color:red;
  font-size:14px;
  word-break:break-all;
  line-height:1.6;
}
</style>
</head>

<body>

<h1>👨‍💼 員工專區</h1>

<div id="box" class="card">
  LINE登入中...
</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

async function getJson(url){
  const res = await fetch(url);
  const text = await res.text();

  try{
    return JSON.parse(text);
  }catch(err){
    throw new Error("API不是JSON：" + url + " / " + text.slice(0,120));
  }
}

async function init(){
  const box = document.getElementById("box");
  let step = "開始";

  try{
    step = "LIFF初始化";
    await liff.init({ liffId: LIFF_ID });

    step = "檢查登入";
    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

step = "取得LINE Profile";

let profile;

try{
  profile = await liff.getProfile();
}catch(err){
  if(
    String(err.message || "").includes("access token expired") ||
    String(err.message || "").includes("The access token expired")
  ){
    liff.logout();
    liff.login();
    return;
  }

  throw err;
}

    if(!profile || !profile.userId){
      throw new Error("沒有取得 LINE User ID");
    }

    const lineUserId = profile.userId;

    step = "檢查員工身份";
    const empData = await getJson("/api/check-employee/" + lineUserId);

    if(!empData.success){
      throw new Error(empData.message || "員工身份檢查失敗");
    }

    if(!empData.isEmployee || !empData.employee){
      location.href = "/customer-menu.html";
      return;
    }

    const emp = empData.employee;

    step = "讀取薪資";
    const salary = await getJson("/api/my-salary/" + lineUserId);

    if(!salary.success){
      throw new Error(salary.message || "薪資資料讀取失敗");
    }

    step = "讀取工時";
    const workData = await getJson("/api/my-worktime/" + lineUserId);

    let totalHours = 0;

const ruleRes = await fetch("/api/rules");
const ruleData = await ruleRes.json();
const rule = ruleData.rules || ruleData;
const breakHours = Number(rule.break_hours || 0);

    if(!totalHours && Array.isArray(workData)){
      const groups = {};

      workData.forEach(item=>{
        const date = new Date(item.clock_time).toLocaleDateString("zh-TW", {
          timeZone:"Asia/Taipei"
        });

        if(!groups[date]){
          groups[date] = {
            start:null,
            end:null
          };
        }

        if(item.type === "上班"){
          if(!groups[date].start || new Date(item.clock_time) < new Date(groups[date].start)){
            groups[date].start = item.clock_time;
          }
        }

        if(item.type === "下班"){
          if(!groups[date].end || new Date(item.clock_time) > new Date(groups[date].end)){
            groups[date].end = item.clock_time;
          }
        }
      });

      Object.values(groups).forEach(day=>{
  if(day.start && day.end){

    const rawHours =
    (new Date(day.end) - new Date(day.start)) / 1000 / 60 / 60;

    const workHours =
    Math.max(
      0,
      rawHours - breakHours
    );

    totalHours += workHours;
  }
});
    }

    const leaveDays =
      Number(salary.leaveDeduction || 0) > 0
      ? Math.round(Number(salary.leaveDeduction || 0) / (Number(salary.baseSalary || 27000) / 30))
      : 0;

    const attendanceStatus =
      salary.attendanceQualified
      ? "✅ 符合"
      : "❌ 不符合";

    step = "產生畫面";

    box.innerHTML = `
      <h2>${emp.name || profile.displayName || "-"}</h2>
      <p>${emp.department || "-"} / ${emp.position || "-"}</p>

      <div class="stats">
        <div class="stat">
          本月工時
          <strong>${Number(totalHours || 0).toFixed(1)} 小時</strong>
        </div>

        <div class="stat">
          預估薪資
          <strong>NT$${Number(salary.netSalary || 0).toLocaleString("zh-TW")}</strong>
        </div>

        <div class="stat">
          本月請假
          <strong>${leaveDays} 天</strong>
        </div>

        <div class="stat">
          交通津貼
          <strong>${attendanceStatus}</strong>
        </div>
      </div>

      <div class="gray">
        <a href="/attendance.html">我要打卡</a>

        <a class="gray" href="/clock-request.html">補打卡</a>

        <a class="gray" href="/leave.html">我要請假</a>

        <a class="gray" href="/my-leave.html">請假紀錄</a>

        <a class="gray" href="/worktime.html">我的工時</a>

        <a class="gray" href="/my-salary.html">我的薪資</a>

        <a class="gray" href="/my-salary-history.html">薪資歷史</a>

        <a class="gray" href="/dashboard.html">管理首頁</a>

        <a class="gray" href="/reimbursement.html">代墊申請</a>

        <a class="gray"href="/my-reimbursement.html">我的代墊</a>

</a>
        
      </div>
    `;

  }catch(err){
    console.error(err);

    box.innerHTML = `
      <div class="error">讀取失敗</div>
      <div class="debug">
        錯誤位置：${step}<br>
        錯誤訊息：${err.message || err}
      </div>
    `;
  }
}

init();
</script>

</body>
</html>
