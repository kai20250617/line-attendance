<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工專區</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  text-align:center;
}
.card{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:520px;
  margin:20px auto;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:15px 0;
}
.stat{
  background:#f1f5f9;
  border-radius:10px;
  padding:12px;
}
.stat strong{
  display:block;
  font-size:20px;
  color:#0d47a1;
  margin-top:5px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}
a{
  display:block;
  padding:16px 10px;
  border-radius:10px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}
.green{background:#2e7d32;}
.orange{background:#f57c00;}
.purple{background:#6a1b9a;}
.teal{background:#00897b;}
.gray{background:#455a64;}
.red{background:#c62828;}
.error{color:red;font-weight:bold;}
.red{background:#c62828;}
</style>
</head>

<body>

<h1>👨‍💼 員工專區</h1>

<div id="box" class="card">
  LINE登入中...
</div>

<script>
const LIFF_ID = "2010241581-YtDxQgWd";

async function init(){
  const box = document.getElementById("box");

  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const empRes = await fetch("/api/check-employee/" + profile.userId);
    const empData = await empRes.json();

    if(!empData.isEmployee){
      location.href = "/customer-menu.html";
      return;
    }

    const salaryRes = await fetch("/api/my-salary/" + profile.userId);
    const salary = await salaryRes.json();

    const workRes = await fetch("/api/my-worktime/" + profile.userId);
    const workData = await workRes.json();

    let totalHours = 0;

    if(Array.isArray(workData)){
      const groups = {};

      workData.forEach(item=>{
        const date = new Date(item.clock_time).toLocaleDateString("zh-TW", {
          timeZone:"Asia/Taipei"
        });

        if(!groups[date]){
          groups[date] = {
            start:null,
            end:null
          };
        }

        if(item.type === "上班"){
          if(!groups[date].start || new Date(item.clock_time) < new Date(groups[date].start)){
            groups[date].start = item.clock_time;
          }
        }

        if(item.type === "下班"){
          if(!groups[date].end || new Date(item.clock_time) > new Date(groups[date].end)){
            groups[date].end = item.clock_time;
          }
        }
      });

      Object.values(groups).forEach(day=>{
        if(day.start && day.end){
          totalHours +=
          (new Date(day.end) - new Date(day.start)) / 1000 / 60 / 60;
        }
      });
    }

    const leaveDays =
      Number(salary.leaveDeduction || 0) > 0
      ? Math.round(Number(salary.leaveDeduction || 0) / (Number(salary.baseSalary || 27000) / 30))
      : 0;

    const attendanceStatus =
      Number(salary.attendanceBonus || 0) > 0
      ? "✅ 符合"
      : "❌ 不符合";

    box.innerHTML = `
      <h2>${empData.employee.name}</h2>
      <p>${empData.employee.department || "-"} / ${empData.employee.position || "-"}</p>

      <div class="stats">
        <div class="stat">
          本月工時
          <strong>${totalHours.toFixed(1)} 小時</strong>
        </div>

        <div class="stat">
          預估薪資
          <strong>NT$${Number(salary.netSalary || 0).toLocaleString("zh-TW")}</strong>
        </div>

        <div class="stat">
          本月請假
          <strong>${leaveDays} 天</strong>
        </div>

        <div class="stat">
          全勤資格
          <strong>${attendanceStatus}</strong>
        </div>
      </div>

      <div class="grid">
        <a href="/attendance.html">🕒 我要打卡</a>
        <a class="green" href="/leave.html">📝 我要請假</a>
        <a class="orange" href="/clock-request.html">🕒 補打卡</a>
        <a class="purple" href="/my-leave.html">📋 請假紀錄</a>
        <a class="teal" href="/worktime.html">⏰ 我的工時</a>
        <a class="gray" href="/my-salary.html">💰 我的薪資</a>
        <a class="red" href="/dashboard.html">📊 管理首頁</a>
      </div>
    `;

  }catch(err){
    console.error(err);
    box.innerHTML =
    "<div class='error'>讀取失敗，請稍後再試</div>";
  }
}

init();
</script>

</body>
</html>
