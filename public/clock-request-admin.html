<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>補打卡審核</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.top{
  text-align:center;
  margin-bottom:20px;
}

input,select{
  padding:10px;
  margin:4px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
}

button{
  border:none;
  padding:10px 16px;
  border-radius:6px;
  color:white;
  cursor:pointer;
  margin:3px;
}

.refresh{background:#4a90e2;}
.back{background:#2196F3;}
.approve{background:#2e7d32;}
.reject{background:#c62828;}
.delete{background:#b71c1c;}
.export{background:#2e7d32;}
.clear{background:#555;}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th{
  background:#222;
  color:white;
  padding:12px;
}

td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.pending{
  color:#f57c00;
  font-weight:bold;
}

.approved{
  color:green;
  font-weight:bold;
}

.rejected{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🕒 補打卡審核</h1>

<div class="top">
  <input type="text" id="filterName" placeholder="搜尋員工">

  <input type="month" id="filterMonth">

  <select id="filterType">
    <option value="">全部類型</option>
    <option value="上班">上班</option>
    <option value="下班">下班</option>
  </select>

  <select id="filterStatus">
    <option value="">全部狀態</option>
    <option value="待審核">待審核</option>
    <option value="已核准">已核准</option>
    <option value="已駁回">已駁回</option>
  </select>

  <button class="refresh" onclick="applyFilter()">篩選</button>
  <button class="clear" onclick="clearFilter()">清除</button>
  <button class="export" onclick="exportCSV()">匯出 CSV</button>
  <button class="refresh" onclick="loadRequests()">重新整理</button>
  <button class="back" onclick="location.href='/dashboard.html'">返回後台</button>
</div>

<table>
<thead>
<tr>
  <th>員工</th>
  <th>類型</th>
  <th>補打卡日期</th>
  <th>補打卡時間</th>
  <th>原因</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>

<tbody id="requestTable">
<tr>
<td colspan="7">讀取中...</td>
</tr>
</tbody>
</table>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

let allRequests = [];
let requestRows = [];

async function loadRequests(){
  const tbody =
  document.getElementById("requestTable");

  tbody.innerHTML =
  "<tr><td colspan='7'>載入中...</td></tr>";

  try{
    const res =
    await fetch("/api/clock-requests");

    const data =
    await res.json();

    if(!Array.isArray(data) || data.length === 0){
      allRequests = [];
      requestRows = [];

      tbody.innerHTML =
      "<tr><td colspan='7'>目前沒有補打卡申請</td></tr>";

      return;
    }

    allRequests = data;
    requestRows = data;

    renderTable();

  }catch(error){
    console.error(error);

    tbody.innerHTML =
    "<tr><td colspan='7'>讀取失敗</td></tr>";
  }
}

function applyFilter(){
  const name =
  document.getElementById("filterName").value.trim();

  const month =
  document.getElementById("filterMonth").value;

  const type =
  document.getElementById("filterType").value;

  const status =
  document.getElementById("filterStatus").value;

  requestRows =
  allRequests.filter(item=>{
    if(name && !(item.name || "").includes(name)){
      return false;
    }

    if(type && item.clock_type !== type){
      return false;
    }

    if(status && item.status !== status){
      return false;
    }

    if(month){
      const d = new Date(item.clock_time);

      const y =
      d.getFullYear();

      const m =
      String(d.getMonth() + 1).padStart(2,"0");

      const itemMonth =
      `${y}-${m}`;

      if(itemMonth !== month){
        return false;
      }
    }

    return true;
  });

  renderTable();
}

function clearFilter(){
  document.getElementById("filterName").value = "";
  document.getElementById("filterMonth").value = "";
  document.getElementById("filterType").value = "";
  document.getElementById("filterStatus").value = "";

  requestRows = allRequests;

  renderTable();
}

function renderTable(){
  const tbody =
  document.getElementById("requestTable");

  if(!requestRows || requestRows.length === 0){
    tbody.innerHTML =
    "<tr><td colspan='7'>沒有符合條件的補打卡資料</td></tr>";
    return;
  }

  tbody.innerHTML = "";

  requestRows.forEach(item=>{
    let statusClass = "pending";

    if(item.status === "已核准" || item.status === "核准"){
      statusClass = "approved";
    }

    if(item.status === "已駁回" || item.status === "駁回"){
      statusClass = "rejected";
    }

    let actionHtml = `
      <button class="delete" onclick="deleteRequest(${item.id})">
        刪除
      </button>
    `;

    if(item.status === "待審核"){
      actionHtml = `
        <button class="approve" onclick="updateStatus(${item.id}, '已核准')">
          核准
        </button>

        <button class="reject" onclick="updateStatus(${item.id}, '已駁回')">
          駁回
        </button>

        <button class="delete" onclick="deleteRequest(${item.id})">
          刪除
        </button>
      `;
    }

    tbody.innerHTML += `
      <tr>
        <td>${item.name || "-"}</td>
        <td>${item.clock_type || "-"}</td>
        <td>${formatDate(item.clock_time)}</td>
        <td>${formatTime(item.clock_time)}</td>
        <td>${item.reason || "-"}</td>
        <td class="${statusClass}">${item.status || "-"}</td>
        <td>${actionHtml}</td>
      </tr>
    `;
  });
}

function formatDate(value){
  if(!value){
    return "-";
  }

  const d =
  new Date(value);

  if(isNaN(d.getTime())){
    return value;
  }

  return d.toLocaleDateString("zh-TW", {
    timeZone:"Asia/Taipei",
    year:"numeric",
    month:"2-digit",
    day:"2-digit"
  });
}

function formatTime(value){
  if(!value){
    return "-";
  }

  const d =
  new Date(value);

  if(isNaN(d.getTime())){
    return value;
  }

  return d.toLocaleTimeString("zh-TW", {
    timeZone:"Asia/Taipei",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

async function updateStatus(id, status){
  if(!confirm("確定要" + status + "這筆補打卡申請嗎？")){
    return;
  }

  try{
    const res =
    await fetch("/api/clock-request/status", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        id,
        status
      })
    });

    const data =
    await res.json();

    alert(data.message || "已更新");

    loadRequests();

  }catch(error){
    console.error(error);
    alert("更新失敗");
  }
}

async function deleteRequest(id){
  if(!confirm("確定刪除這筆補打卡申請？")){
    return;
  }

  try{
    const res =
    await fetch("/api/clock-request/" + id, {
      method:"DELETE"
    });

    const data =
    await res.json();

    alert(data.message || "已刪除");

    loadRequests();

  }catch(error){
    console.error(error);
    alert("刪除失敗");
  }
}

function exportCSV(){
  if(!requestRows || requestRows.length === 0){
    alert("沒有資料可匯出");
    return;
  }

  let csv =
  "\uFEFF員工,類型,補打卡日期,補打卡時間,原因,狀態\n";

  requestRows.forEach(item=>{
    csv += [
      item.name || "-",
      item.clock_type || "-",
      formatDate(item.clock_time),
      formatTime(item.clock_time),
      item.reason || "-",
      item.status || "-"
    ].map(v =>
      `"${String(v).replace(/"/g,'""')}"`
    ).join(",") + "\n";
  });

  const blob =
  new Blob([csv], {
    type:"text/csv;charset=utf-8;"
  });

  const url =
  URL.createObjectURL(blob);

  const a =
  document.createElement("a");

  a.href = url;
  a.download =
  "clock-request-records.csv";

  a.click();

  URL.revokeObjectURL(url);
}

loadRequests();
</script>

</body>
</html>
