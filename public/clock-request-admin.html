<!DOCTYPE html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>補打卡審核</title>

<style>

body{

  font-family:Arial,sans-serif;

  background:#f5f5f5;

  padding:20px;

}

h1{

  text-align:center;

}

.top{

  text-align:center;

  margin-bottom:20px;

}

button{

  border:none;

  padding:10px 16px;

  border-radius:6px;

  color:white;

  cursor:pointer;

  margin:3px;

}

.refresh{

  background:#4a90e2;

}

.back{

  background:#2196F3;

}

.approve{

  background:#2e7d32;

}

.reject{

  background:#c62828;

}

table{

  width:100%;

  border-collapse:collapse;

  background:white;

}

th{

  background:#222;

  color:white;

  padding:12px;

}

td{

  border:1px solid #ddd;

  padding:10px;

  text-align:center;

}

.pending{

  color:#f57c00;

  font-weight:bold;

}

.approved{

  color:green;

  font-weight:bold;

}

.rejected{

  color:red;

  font-weight:bold;

}

</style>

</head>

<body>

<h1>🕒 補打卡審核</h1>

<div class="top">

  <button class="refresh" onclick="loadRequests()">重新整理</button>

  <button class="back" onclick="location.href='/dashboard.html'">返回後台</button>

</div>

<table>

<thead>

<tr>

  <th>員工</th>

  <th>類型</th>

  <th>補打卡時間</th>

  <th>原因</th>

  <th>狀態</th>

  <th>操作</th>

</tr>

</thead>

<tbody id="requestTable">

<tr>

<td colspan="6">讀取中...</td>

</tr>

</tbody>

</table>

<script>

if(localStorage.getItem("adminLogin") !== "yes"){

  window.location.href = "/login.html";

}

async function loadRequests(){

  const tbody = document.getElementById("requestTable");

  tbody.innerHTML =

  "<tr><td colspan='6'>載入中...</td></tr>";

  try{

    const res = await fetch("/api/clock-requests");

    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){

      tbody.innerHTML =

      "<tr><td colspan='6'>目前沒有補打卡申請</td></tr>";

      return;

    }

    tbody.innerHTML = "";

    data.forEach(item=>{

      let statusClass = "pending";

      if(item.status === "已核准" || item.status === "核准"){

        statusClass = "approved";

      }

      if(item.status === "已駁回" || item.status === "駁回"){

        statusClass = "rejected";

      }

      let actionHtml = "-";

      if(item.status === "待審核"){

        actionHtml = `

          <button class="approve" onclick="updateStatus(${item.id}, '已核准')">

            核准

          </button>

          <button class="reject" onclick="updateStatus(${item.id}, '已駁回')">

            駁回

          </button>

        `;

      }

      tbody.innerHTML += `

        <tr>

          <td>${item.name || "-"}</td>

          <td>${item.clock_type || "-"}</td>

          <td>${formatDateTime(item.clock_time)}</td>

          <td>${item.reason || "-"}</td>

          <td class="${statusClass}">${item.status || "-"}</td>

          <td>${actionHtml}</td>

        </tr>

      `;

    });

  }catch(error){

    console.error(error);

    tbody.innerHTML =

    "<tr><td colspan='6'>讀取失敗</td></tr>";

  }

}

function formatDateTime(value){

  if(!value){

    return "-";

  }

  const d = new Date(value);

  if(isNaN(d.getTime())){

    return value;

  }

  return d.toLocaleString("zh-TW", {

    timeZone:"Asia/Taipei"

  });

}

async function updateStatus(id, status){

  if(!confirm("確定要" + status + "這筆補打卡申請嗎？")){

    return;

  }

  try{

    const res = await fetch("/api/clock-request/status", {

      method:"POST",

      headers:{

        "Content-Type":"application/json"

      },

      body:JSON.stringify({

        id,

        status

      })

    });

    const data = await res.json();

    alert(data.message || "已更新");

    loadRequests();

  }catch(error){

    console.error(error);

    alert("更新失敗");

  }

}

loadRequests();

</script>

</body>

</html>
