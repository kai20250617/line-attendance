<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>員工打卡系統</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

.info{
    margin:10px;
    font-size:18px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
}
</style>

</head>
<body>

<h1>員工打卡系統</h1>

<div class="info" id="employeeName">
LINE登入中...
</div>

<div class="info" id="gpsStatus">
定位中...
</div>

<div class="info" id="gpsAccuracy">
GPS精準度：
</div>

<button onclick="getLocation()">
重新定位
</button>

<br>

<button onclick="clock('上班')">
上班打卡
</button>

<button onclick="clock('下班')">
下班打卡
</button>

<p id="status"></p>

<script>

const LIFF_ID = "2010241581-YtDxQgWd";

let profile = null;

let latitude = null;
let longitude = null;
let accuracy = null;

async function init(){

    try{

        await liff.init({
            liffId: LIFF_ID
        });

        if(!liff.isLoggedIn()){
            liff.login();
            return;
        }

        profile = await liff.getProfile();

        document.getElementById("employeeName").innerHTML =
            "員工：<b>" + profile.displayName + "</b>";

        getLocation();

    }catch(err){

        console.error(err);

        document.getElementById("status").innerHTML =
        "<span class='error'>LINE初始化失敗</span>";

    }

}

function getLocation(){

    document.getElementById("gpsStatus").innerHTML =
    "正在取得定位...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            latitude = position.coords.latitude;
            longitude = position.coords.longitude;
            accuracy = position.coords.accuracy;

            document.getElementById("gpsStatus").innerHTML =
            "目前位置：<br>" +
            latitude +
            "<br>" +
            longitude;

            document.getElementById("gpsAccuracy").innerHTML =
            "GPS精準度：約 " +
            Math.round(accuracy) +
            " 公尺";

        },

        function(error){

            document.getElementById("gpsStatus").innerHTML =
            "<span class='error'>定位失敗，請開啟GPS權限</span>";

            console.error(error);

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );

}

async function clock(type){

    if(!profile){

        alert("LINE尚未登入");
        return;

    }

    if(latitude === null || longitude === null){

        alert("尚未取得GPS定位");
        return;

    }

    try{

        const response = await fetch("/api/clock",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                lineUserId:profile.userId,
                name:profile.displayName,
                type:type,
                latitude:latitude,
                longitude:longitude

            })

        });

        const data = await response.json();

        document.getElementById("status").innerHTML =
        "<span class='success'>" +
        data.message +
        "</span><br><br>" +

        "打卡類型：" + type +
        "<br>" +

        "打卡時間：" + new Date().toLocaleString("zh-TW") +
        "<br><br>" +

        "<a target='_blank' href='https://maps.google.com/?q="
        + latitude + "," + longitude +
        "'>查看打卡位置</a>";

    }
    catch(err){

        console.error(err);

        document.getElementById("status").innerHTML =
        "<span class='error'>打卡失敗</span>";

    }

}

init();

</script>

</body>
</html>
