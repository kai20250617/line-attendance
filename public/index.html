<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統登入中...</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f5f5f5;
}

.box{
  text-align:center;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>

</head>

<body>

<div class="box">
  <h2>系統登入中...</h2>
  <p>請稍候</p>
</div>

<script>

const LIFF_ID = "2010241581-YtDxQgWd";

async function init(){

  try{

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile =
      await liff.getProfile();

    const res =
      await fetch(
        "/api/check-employee/" +
        profile.userId
      );

    const data =
      await res.json();

    if(
      data.success &&
      data.isEmployee
    ){

      location.href =
      "/employee-menu.html";

    }else{

      location.href =
      "/customer-menu.html";

    }

  }catch(err){

    console.error(err);

    document.body.innerHTML =
    `
    <div class="box">
      <h2>系統錯誤</h2>
      <p>請稍後再試</p>
    </div>
    `;

  }

}

init();

</script>

</body>
</html>
