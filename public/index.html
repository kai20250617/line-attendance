<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>員工打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>員工打卡系統</h1>
  <p id="employeeName">LINE 登入中...</p>

  <button onclick="clock('上班')">上班打卡</button>
  <button onclick="clock('下班')">下班打卡</button>

  <p id="status"></p>

  <script>
    const LIFF_ID = "2010241581-YtDxQgWd";
    let profile = null;

    async function init() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      profile = await liff.getProfile();

      document.getElementById("employeeName").innerText =
        "員工：" + profile.displayName;
    }

    async function clock(type) {
      if (!profile) {
        alert("LINE 尚未登入完成");
        return;
      }

      const res = await fetch("/api/clock", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          lineUserId: profile.userId,
          name: profile.displayName,
          type: type,
          latitude: 25.033,
          longitude: 121.565
        })
      });

      const data = await res.json();
      document.getElementById("status").innerText = data.message + "：" + type;
    }

    init();
  </script>
</body>
</html>
