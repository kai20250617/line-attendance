<!DOCTYPE html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>管理首頁 Dashboard</title>

<style>

body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;}

h1{text-align:center;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}

.card{background:white;padding:20px;border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

.card h2{font-size:18px;color:#555;}

.card p{font-size:28px;font-weight:bold;color:#222;}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;}

a{display:block;background:#222;color:white;text-decoration:none;text-align:center;padding:15px;border-radius:8px;}

a:hover{background:#444;}

.logout{background:#e53935;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;}

.top{text-align:center;margin-bottom:20px;}

</style>

</head>

<body>

<h1>📊 管理首頁 Dashboard</h1>

<div class="top">

  <button class="logout" onclick="logout()">登出</button>

</div>

<div class="grid">

  <div class="card">

    <h2>今日打卡筆數</h2>

    <p id="todayClock">0</p>

  </div>

  <div class="card">

    <h2>今日請假人數</h2>

    <p id="todayLeave">0</p>

  </div>

  <div class="card">

    <h2>待審核請假</h2>

    <p id="pendingLeave">0</p>

  </div>

  <div class="card">

    <h2>待審核補打卡</h2>

    <p id="pendingClock">0</p>

  </div>

  <div class="card">

    <h2>在職員工</h2>

    <p id="employeeCount">0</p>

  </div>

  <div class="card">

    <h2>本月總工時</h2>

    <p id="monthHours">0</p>

  </div>

  <div class="card">

    <h2>預估薪資</h2>

    <p id="monthSalary">NT$0</p>

  </div>

</div>

<div class="menu">

  <a href="/settings.html">GPS設定</a>

  <a href="/rules.html">出勤規則</a>

  <a href="/attendance-record.html">出勤紀錄</a>

  <a href="/worktime.html">工時統計</a>

  <a href="/leave-admin.html">請假審核</a>

  <a href="/clock-request-admin.html">補打卡審核</a>

  <a href="/salary.html">薪資計算</a>

  <a href="/monthly.html">月薪總表</a>

  <a href="/salary-report.html">薪資總表</a>

  <a href="/employee.html">員工管理</a>

  <a href="/salary-close.html" class="red">💰 月結薪資</a>

  <a href="/salary-history.html">📄 薪資歷史</a>

</div>

<script>

if(localStorage.getItem("adminLogin") !== "yes"){

  window.location.href = "/login.html";

}

function logout(){

  localStorage.removeItem("adminLogin");

  window.location.href = "/login.html";

}

async function safeJson(url){

  try{

    const res = await fetch(url);

    if(!res.ok){

      return [];

    }

    const data = await res.json();

    if(Array.isArray(data)){

      return data;

    }

    return [];

  }catch(error){

    console.error(url, error);

    return [];

  }

}

async function loadDashboard(){

  const attendance = await safeJson("/api/attendance");

  const leaves = await safeJson("/api/leaves");

  const employees = await safeJson("/api/employees");

  const clockRequests = await safeJson("/api/clock-requests");

  const today = new Date().toLocaleDateString("zh-TW", {

    timeZone:"Asia/Taipei"

  });

  const now = new Date();

  const month = now.getMonth();

  const year = now.getFullYear();

  const todayClock = attendance.filter(item =>

    new Date(item.clock_time).toLocaleDateString("zh-TW", {

      timeZone:"Asia/Taipei"

    }) === today

  ).length;

  const todayLeaveNames = new Set();

  leaves.forEach(item=>{

    if(item.start_date && item.end_date){

      const start = new Date(item.start_date);

      const end = new Date(item.end_date);

      const todayDate = new Date();

      if(todayDate >= start && todayDate <= end){

        todayLeaveNames.add(item.name);

      }

    }

  });

  const pendingLeave = leaves.filter(

    item => item.status === "待審核"

  ).length;

  const pendingClock = clockRequests.filter(

    item => item.status === "待審核"

  ).length;

  const employeeCount = employees.filter(

    item => item.status === "在職"

  ).length;

  const groups = {};

  attendance.forEach(item=>{

    const d = new Date(item.clock_time);

    if(d.getFullYear() !== year || d.getMonth() !== month){

      return;

    }

    const date = d.toLocaleDateString("zh-TW", {

      timeZone:"Asia/Taipei"

    });

    const key = item.line_user_id + "_" + date;

    if(!groups[key]){

      groups[key] = {

        name:item.name,

        start:null,

        end:null

      };

    }

    if(item.type === "上班"){

      if(!groups[key].start || new Date(item.clock_time) < new Date(groups[key].start)){

        groups[key].start = item.clock_time;

      }

    }

    if(item.type === "下班"){

      if(!groups[key].end || new Date(item.clock_time) > new Date(groups[key].end)){

        groups[key].end = item.clock_time;

      }

    }

  });

  let totalHours = 0;

  let estimatedSalary = 0;

  Object.values(groups).forEach(row=>{

    if(row.start && row.end){

      const hours =

      (new Date(row.end) - new Date(row.start)) / 1000 / 60 / 60;

      totalHours += hours;

      const emp = employees.find(e =>

        e.line_user_id &&

        attendance.some(a =>

          a.line_user_id === e.line_user_id &&

          a.name === row.name

        )

      );

      const wage = emp ? Number(emp.hourly_wage || 200) : 200;

      estimatedSalary += hours * wage;

    }

  });

  document.getElementById("todayClock").innerText = todayClock;

  document.getElementById("todayLeave").innerText = todayLeaveNames.size;

  document.getElementById("pendingLeave").innerText = pendingLeave;

  document.getElementById("pendingClock").innerText = pendingClock;

  document.getElementById("employeeCount").innerText = employeeCount;

  document.getElementById("monthHours").innerText = totalHours.toFixed(2);

  document.getElementById("monthSalary").innerText =

    "NT$" + Math.round(estimatedSalary).toLocaleString("zh-TW");

}

loadDashboard();

</script>

</body>

</html>
