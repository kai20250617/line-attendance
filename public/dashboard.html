<script>

// =========================
// 管理員登入驗證
// =========================

if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

// =========================
// Dashboard
// =========================

async function loadDashboard(){

  const wage = 200;

  const attendanceRes =
  await fetch("/api/attendance");

  const attendance =
  await attendanceRes.json();

  const leavesRes =
  await fetch("/api/leaves");

  const leaves =
  await leavesRes.json();

  const today =
  new Date().toLocaleDateString("zh-TW");

  const month =
  new Date().getMonth();

  const year =
  new Date().getFullYear();

  const todayClock =
  attendance.filter(item=>{

    return new Date(
      item.clock_time
    ).toLocaleDateString("zh-TW")
    === today;

  }).length;

  const todayLeaveNames =
  new Set();

  leaves.forEach(item=>{

    if(item.start_date && item.end_date){

      const start =
      new Date(item.start_date);

      const end =
      new Date(item.end_date);

      const now =
      new Date();

      if(now >= start && now <= end){

        todayLeaveNames.add(
          item.name
        );

      }

    }

  });

  const pendingLeave =
  leaves.filter(
    item =>
    item.status === "待審核"
  ).length;

  const groups = {};

  attendance.forEach(item=>{

    const d =
    new Date(item.clock_time);

    if(
      d.getFullYear() !== year ||
      d.getMonth() !== month
    ){
      return;
    }

    const date =
    d.toLocaleDateString("zh-TW");

    const key =
    item.name + "_" + date;

    if(!groups[key]){

      groups[key] = {
        start:null,
        end:null
      };

    }

    if(item.type === "上班"){

      if(
        !groups[key].start ||
        new Date(item.clock_time)
        <
        new Date(groups[key].start)
      ){

        groups[key].start =
        item.clock_time;

      }

    }

    if(item.type === "下班"){

      if(
        !groups[key].end ||
        new Date(item.clock_time)
        >
        new Date(groups[key].end)
      ){

        groups[key].end =
        item.clock_time;

      }

    }

  });

  let totalHours = 0;

  Object.values(groups)
  .forEach(row=>{

    if(
      row.start &&
      row.end
    ){

      totalHours +=
      (
        new Date(row.end)
        -
        new Date(row.start)
      )
      /
      1000
      /
      60
      /
      60;

    }

  });

  document.getElementById(
    "todayClock"
  ).innerText =
  todayClock;

  document.getElementById(
    "todayLeave"
  ).innerText =
  todayLeaveNames.size;

  document.getElementById(
    "pendingLeave"
  ).innerText =
  pendingLeave;

  document.getElementById(
    "monthHours"
  ).innerText =
  totalHours.toFixed(2);

  document.getElementById(
    "monthSalary"
  ).innerText =
  "NT$" +
  Math.round(
    totalHours * wage
  ).toLocaleString("zh-TW");

}

loadDashboard();

</script>
