<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>薪資總表</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.top{
  text-align:center;
  margin-bottom:20px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
  margin:5px;
}

.refresh{
  background:#4a90e2;
}

.back{
  background:#2196F3;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th{
  background:#222;
  color:white;
  padding:12px;
}

td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.gross{
  color:#1b5e20;
  font-weight:bold;
}

.deduct{
  color:#c62828;
  font-weight:bold;
}

.net{
  color:#0d47a1;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>💰 薪資總表</h1>

<div class="top">
  <button class="refresh" onclick="loadSalaryReport()">重新整理</button>
  <button class="back" onclick="location.href='/dashboard.html'">返回後台</button>
</div>

<table>
<thead>
<tr>
  <th>員工</th>
  <th>底薪</th>
  <th>固定津貼</th>
  <th>交通津貼</th>
  <th>加班費</th>
  <th>績效獎金</th>
  <th>請假扣款</th>
  <th>應發薪資</th>
  <th>勞保</th>
  <th>健保</th>
  <th>勞退提繳</th>
  <th>實發薪資</th>
</tr>
</thead>

<tbody id="salaryTable">
<tr>
<td colspan="12">讀取中...</td>
</tr>
</tbody>
</table>

<script>
if(localStorage.getItem("adminLogin") !== "yes"){
  window.location.href = "/login.html";
}

function money(value){
  const num = Number(value);

  if(isNaN(num)){
    return "NT$0";
  }

  return "NT$" + Math.round(num).toLocaleString("zh-TW");
}

async function loadSalaryReport(){
  const tbody = document.getElementById("salaryTable");

  tbody.innerHTML =
  "<tr><td colspan='12'>載入中...</td></tr>";

  try{
    const res = await fetch("/api/salary-report");

    if(!res.ok){
      tbody.innerHTML =
      "<tr><td colspan='12'>API讀取失敗：" + res.status + "</td></tr>";
      return;
    }

    const data = await res.json();

    console.log("薪資資料：", data);

    if(!Array.isArray(data)){
      tbody.innerHTML =
      "<tr><td colspan='12'>資料格式錯誤，API不是陣列</td></tr>";
      return;
    }

    if(data.length === 0){
      tbody.innerHTML =
      "<tr><td colspan='12'>目前沒有薪資資料</td></tr>";
      return;
    }

    tbody.innerHTML = "";

    data.forEach(item=>{
      const name = item.name || "-";

      const baseSalary =
      Number(item.baseSalary || 0);

      const fixedAllowance =
      Number(item.fixedAllowance || 0);

      const overtimePay =
      Number(item.overtimePay || 0);

      const transportAllowance =
      Number(item.transportAllowance || 0);

      const performanceBonus =
      Number(item.performanceBonus || 0);

      const leaveDeduction =
      Number(item.leaveDeduction || 0);

      const grossSalary =
      Number(item.grossSalary || 0);

      const laborInsurance =
      Number(item.laborInsurance || 0);

      const healthInsurance =
      Number(item.healthInsurance || 0);

      const laborPension =
      Number(item.laborPension || 0);

      const netSalary =
      Number(item.netSalary || 0);

      tbody.innerHTML += `
        <tr>
          <td>${name}</td>
          <td>${money(baseSalary)}</td>
          <td>${money(fixedAllowance)}</td>
          <td>${money(overtimePay)}</td>
          <td>${money(transportAllowance)}</td>
          <td>${money(performanceBonus)}</td>
          <td class="deduct">${money(leaveDeduction)}</td>
          <td class="gross">${money(grossSalary)}</td>
          <td class="deduct">${money(laborInsurance)}</td>
          <td class="deduct">${money(healthInsurance)}</td>
          <td class="deduct">${money(laborPension)}</td>
          <td class="net">${money(netSalary)}</td>
        </tr>
      `;
    });

  }catch(error){
    console.error("薪資總表錯誤：", error);

    tbody.innerHTML =
    "<tr><td colspan='12'>讀取失敗，請開啟 F12 Console 查看錯誤</td></tr>";
  }
}

loadSalaryReport();
</script>

</body>
</html>
